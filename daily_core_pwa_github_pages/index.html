  <style>

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{background:var(--bg);font-family:var(--font);color:var(--text)}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% -10%,rgba(255,255,255,.7),transparent 36%),radial-gradient(circle at 90% 0%,rgba(10,132,255,.1),transparent 30%),var(--bg);overflow-x:hidden}button,input,select{font:inherit;color:inherit}button{border:0;background:none;cursor:pointer}.app{width:100%;max-width:430px;min-height:100vh;margin:0 auto;padding:calc(18px + var(--safe-top)) 14px calc(22px + var(--safe-bottom));display:flex;flex-direction:column;gap:14px}.top{display:flex;justify-content:space-between;align-items:center;padding:2px}.eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700}h1{margin:2px 0 0;font-size:28px;line-height:1.02;letter-spacing:-.8px}.icons{display:flex;gap:8px}.icon{width:40px;height:40px;border-radius:999px;background:var(--surface);border:1px solid var(--border);box-shadow:var(--soft);backdrop-filter:blur(24px) saturate(150%);display:grid;place-items:center}.icon:active,.btn:active,.step:active{transform:scale(.97)}.icon svg{width:18px;height:18px;stroke:currentColor;opacity:.78}.card{border-radius:28px;background:var(--surface);border:1px solid var(--border);box-shadow:var(--soft);backdrop-filter:blur(24px) saturate(150%);padding:16px;overflow:hidden}.hero{box-shadow:var(--shadow);padding:18px}.hero-grid{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center}.date{font-size:13px;color:var(--muted);font-weight:560}.big{font-size:46px;line-height:.92;letter-spacing:-2.2px;font-weight:790;margin:7px 0}.pills{display:flex;gap:6px;flex-wrap:wrap}.pill{height:24px;border-radius:999px;background:rgba(255,255,255,.42);border:1px solid var(--border);padding:0 9px;display:inline-flex;align-items:center;font-size:12px;font-weight:650;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ring{--p:0;width:104px;height:104px;border-radius:999px;display:grid;place-items:center;background:conic-gradient(var(--accent) calc(var(--p)*1%),rgba(142,142,147,.18) 0);position:relative;flex:none}.ring:before{content:"";position:absolute;width:78px;height:78px;border-radius:999px;background:var(--strong);box-shadow:inset 0 0 0 1px var(--border)}.ring div{position:relative;text-align:center}.ring strong{font-size:24px;line-height:1}.ring span{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700}.timer{background:var(--strong)}.timer-top{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:start}.state{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:720}.title{font-size:20px;font-weight:720;line-height:1.12;letter-spacing:-.48px;margin-top:5px;overflow-wrap:anywhere}.sub{font-size:13px;line-height:1.35;color:var(--muted);margin-top:4px;overflow-wrap:anywhere}.time{font-size:48px;line-height:.92;font-weight:790;letter-spacing:-2.2px;text-align:right;white-space:nowrap;min-width:118px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.btn{height:52px;border-radius:18px;display:flex;align-items:center;justify-content:center;padding:0 14px;font-size:15px;font-weight:680;letter-spacing:-.22px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:transform .2s}.primary{background:var(--text);color:var(--bg);box-shadow:0 10px 24px rgba(0,0,0,.14)}.secondary{background:rgba(255,255,255,.38);border:1px solid var(--border)}.danger{background:rgba(208,69,69,.1);border:1px solid rgba(208,69,69,.2);color:var(--danger)}.head{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:0 4px 10px}.section{font-size:13px;font-weight:720}.note{font-size:12px;color:var(--muted);font-weight:560;white-space:nowrap}.steps{position:relative}.steps:before{content:"";position:absolute;top:12px;bottom:12px;left:14px;width:2px;background:rgba(142,142,147,.2);border-radius:99px}.step{position:relative;width:100%;display:grid;grid-template-columns:30px minmax(0,1fr) minmax(54px,auto);gap:10px;align-items:center;min-height:58px;padding:8px 4px;border-radius:18px;text-align:left;transition:transform .2s,background .2s}.step.active{background:rgba(255,255,255,.34)}.node{width:30px;height:30px;display:grid;place-items:center;z-index:2}.dot{width:12px;height:12px;border-radius:999px;background:var(--strong);border:2px solid rgba(142,142,147,.34)}.active .dot{width:14px;height:14px;background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 5px rgba(10,132,255,.18)}.done .dot{width:18px;height:18px;background:var(--good);border-color:var(--good);box-shadow:0 0 0 4px rgba(31,122,77,.13);position:relative}.done .dot:after{content:"×";color:#fff;font-size:16px;font-weight:760;position:absolute;left:50%;top:50%;transform:translate(-50%,-54%)}.stitle{font-size:15px;font-weight:690;letter-spacing:-.22px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ssub{font-size:12px;color:var(--muted);line-height:1.28;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chip{height:28px;border-radius:999px;background:rgba(255,255,255,.38);border:1px solid var(--border);font-size:12px;color:var(--muted);font-weight:680;padding:0 8px;display:flex;align-items:center;justify-content:center;white-space:nowrap}.done .stitle,.done .ssub,.done .chip{color:var(--faint)}.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.weekday{height:22px;display:grid;place-items:center;color:var(--muted);font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:720}.day{aspect-ratio:1;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.38);display:grid;place-items:center;position:relative;font-size:12px;font-weight:660;color:var(--muted)}.today{color:var(--text);border-color:rgba(10,132,255,.35)}.day.done{background:var(--text);color:var(--bg);border-color:transparent}.day.done:after{content:"×";position:absolute;inset:0;display:grid;place-items:center;font-size:22px;font-weight:760;color:var(--bg)}.day.done span{opacity:0}.complete{display:none;background:var(--text);color:var(--bg)}.complete.show{display:block}.complete strong{font-size:22px;display:block;margin-bottom:6px}.complete span{font-size:13px;color:rgba(255,255,255,.7)}.settings{display:none;flex-direction:column;gap:14px}.settings.open{display:flex}.field{display:grid;grid-template-columns:minmax(0,1fr) 96px;gap:12px;align-items:center;min-height:44px}.field label{font-size:14px;font-weight:690;letter-spacing:-.18px}.field small{display:block;color:var(--muted);font-size:12px;font-weight:500;line-height:1.25;margin-top:2px}.field input,.field select{width:100%;height:40px;border-radius:14px;border:1px solid var(--border);background:var(--strong);padding:0 10px;text-align:right;outline:0;font-size:14px;font-weight:650}.settings-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.hidden{position:absolute;opacity:0;pointer-events:none}.toast{position:fixed;left:50%;bottom:calc(18px + var(--safe-bottom));transform:translateX(-50%) translateY(24px);width:min(360px,calc(100% - 28px));min-height:54px;border-radius:20px;background:rgba(20,20,22,.88);color:#fff;display:flex;align-items:center;justify-content:center;padding:12px 16px;text-align:center;font-size:14px;font-weight:620;opacity:0;pointer-events:none;transition:.25s;z-index:20}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(max-width:380px){.app{padding-left:10px;padding-right:10px}.timer-top{grid-template-columns:1fr}.time{text-align:left;min-width:0;font-size:44px}.big{font-size:40px}.ring{width:92px;height:92px}.ring:before{width:68px;height:68px}.field{grid-template-columns:1fr}.field input,.field select{text-align:left}.actions{grid-template-columns:1fr}}

<body>
<main class="app">
<header class="top"><div><div class="eyebrow">Private Training</div><h1>Daily Core</h1></div><div class="icons"><button class="icon" id="themeBtn"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 7.3A9 9 0 1 1 12 3Z"/></svg></button><button class="icon" id="settingsBtn"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .58V20a2 2 0 1 1-4 0v-.02a1.7 1.7 0 0 0-1-.58 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.58-1H4a2 2 0 1 1 0-4h.02a1.7 1.7 0 0 0 .58-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.58V4a2 2 0 1 1 4 0v.02a1.7 1.7 0 0 0 1 .58 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.2.35.4.68.58 1H20a2 2 0 1 1 0 4h-.02c-.18.32-.38.65-.58 1Z"/></svg></button></div></header>
<section class="card hero"><div class="hero-grid"><div><div class="date" id="dateLine"></div><div class="big" id="sessionTitle">Neuer Tag</div><div class="pills"><span class="pill" id="pushGoalPill"></span><span class="pill" id="plankGoalPill"></span></div></div><div class="ring" id="progressRing"><div><strong id="progressPercent">0</strong><span>Prozent</span></div></div></div></section>
<section class="card complete" id="completion"><strong>Training abgeschlossen.</strong><span>Der heutige Tag wurde automatisch im Kalender markiert. Dein Stand ist lokal gespeichert.</span></section>
<section class="card timer"><div class="timer-top"><div><div class="state" id="timerState">Bereit</div><div class="title" id="currentTitle"></div><div class="sub" id="currentSubtitle"></div></div><div class="time" id="timeDisplay">00:00</div></div><div class="actions"><button class="btn primary" id="mainBtn">Start</button><button class="btn secondary" id="skipBtn">Überspringen</button></div></section>
<section class="card"><div class="head"><div class="section">Ablauf</div><div class="note" id="stepCounter">0 / 20</div></div><div class="steps" id="steps"></div></section>
<section class="card"><div class="head"><div class="section" id="calendarTitle">Kalender</div><div class="note" id="streakText">0 Tage</div></div><div class="cal" id="calendarGrid"></div></section>
<section class="card settings" id="settingsPanel">
<div class="head"><div><div class="section">Setup</div><div class="note">lokal gespeichert</div></div></div>
<div class="field"><label>Push-ups pro Tag<small>Gesamtziel</small></label><input id="pushGoal" type="number" min="10" max="500" step="5"></div>
<div class="field"><label>Push-up Sätze<small>gleichmäßig verteilt</small></label><input id="pushSets" type="number" min="2" max="30"></div>
<div class="field"><label>Push-up Countdown<small>Sekunden pro Satz</small></label><input id="pushSeconds" type="number" min="10" max="180" step="5"></div>
<div class="field"><label>Plank Ziel in Minuten<small>5 bis 10 sinnvoll</small></label><input id="plankMinutes" type="number" min="1" max="30"></div>
<div class="field"><label>Plank Sätze<small>z. B. 10 × 30s</small></label><input id="plankSets" type="number" min="2" max="30"></div>
<div class="field"><label>Session-Dauer<small>Auto-Pace in Minuten</small></label><input id="sessionMinutes" type="number" min="10" max="180"></div>
<div class="field"><label>Training Split<small>erst eins oder abwechselnd</small></label><select id="splitMode"><option value="blocks">Erst eins</option><option value="alternating">Abwechselnd</option></select></div>
<div class="settings-actions"><button class="btn secondary" id="newDayBtn">Neuer Tag</button><button class="btn danger" id="resetBtn">Reset</button></div>
<div class="settings-actions"><button class="btn secondary" id="exportBtn">Backup</button><button class="btn secondary" id="importBtn">Import</button><input class="hidden" id="importFile" type="file" accept="application/json"></div>
</section>
</main><div class="toast" id="toast"></div>
<script>
const KEY="daily-core-v3";const defaults={pushGoal:100,pushSets:10,pushSeconds:45,plankMinutes:5,plankSets:10,sessionMinutes:60,splitMode:"blocks",theme:"light"};let state=load();let timer=null;
const $=id=>document.getElementById(id);const ids=["dateLine","sessionTitle","pushGoalPill","plankGoalPill","progressRing","progressPercent","completion","timerState","currentTitle","currentSubtitle","timeDisplay","mainBtn","skipBtn","steps","stepCounter","calendarTitle","streakText","calendarGrid","settingsBtn","themeBtn","settingsPanel","pushGoal","pushSets","pushSeconds","plankMinutes","plankSets","sessionMinutes","splitMode","newDayBtn","resetBtn","exportBtn","importBtn","importFile","toast"];const el=Object.fromEntries(ids.map(id=>[id,$(id)]));
function key(d=new Date()){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function load(){try{return norm(JSON.parse(localStorage.getItem(KEY)))}catch{return fresh()}}
function fresh(){let s={...defaults};return{version:3,settings:s,history:{},session:create(s),restUntil:null,workStarted:null}}
function norm(x){let s={...defaults,...(x?.settings||{})};return{version:3,settings:s,history:x?.history||{},session:x?.session?.date===key()?x.session:create(s),restUntil:x?.restUntil||null,workStarted:x?.workStarted||null}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function create(s){return{date:key(),started:false,completed:false,currentIndex:0,steps:build(s)}}
function build(s){let pg=+s.pushGoal,ps=+s.pushSets,pm=+s.plankMinutes*60,pls=+s.plankSets,psec=+s.pushSeconds;let pb=Math.floor(pg/ps),pr=pg%ps,plb=Math.floor(pm/pls),plr=pm%pls;let push=Array.from({length:ps},(_,i)=>({id:`p${i}`,type:"push",title:`Push-ups ${i+1}`,amount:pb+(i<pr?1:0),duration:psec,done:false}));let plank=Array.from({length:pls},(_,i)=>({id:`l${i}`,type:"plank",title:`Plank ${i+1}`,amount:0,duration:plb+(i<plr?1:0),done:false}));if(s.splitMode==="alternating"){let r=[],m=Math.max(push.length,plank.length);for(let i=0;i<m;i++){if(push[i])r.push(push[i]);if(plank[i])r.push(plank[i])}return r}return[...push,...plank]}
function ensure(){if(state.session.date!==key()){state.session=create(state.settings);state.restUntil=null;state.workStarted=null}}
function cur(){return state.session.steps[state.session.currentIndex]||null}function done(){return state.session.steps.filter(s=>s.done).length}function pct(){return Math.round(done()/(state.session.steps.length||1)*100)}
function fmt(sec){sec=Math.max(0,Math.ceil(sec));let m=Math.floor(sec/60),s=sec%60;return`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`}
function label(s){return s.type==="push"?`${s.amount} Liegestützen`:`${fmt(s.duration)} Plank`}
function isRest(){return state.restUntil&&new Date(state.restUntil).getTime()>Date.now()}
function rem(s){if(!s)return 0;if(!state.workStarted)return s.duration;return Math.max(0,s.duration-(Date.now()-new Date(state.workStarted).getTime())/1000)}
function restSeconds(){let totalTarget=state.settings.sessionMinutes*60;let work=state.session.steps.reduce((a,s)=>a+s.duration,0);let gaps=Math.max(1,state.session.steps.length-1);return Math.max(10,Math.round((totalTarget-work)/gaps))}
function render(){ensure();document.documentElement.dataset.theme=state.settings.theme;let p=pct(),s=cur(),rest=isRest();el.dateLine.textContent=new Date().toLocaleDateString("de-DE",{weekday:"long",day:"2-digit",month:"long"});el.sessionTitle.textContent=state.session.completed?"Done":state.session.started?"Läuft":"Neuer Tag";let push=state.session.steps.filter(x=>x.type==="push"&&x.done).reduce((a,x)=>a+x.amount,0);let plank=state.session.steps.filter(x=>x.type==="plank"&&x.done).reduce((a,x)=>a+x.duration,0);el.pushGoalPill.textContent=`${push}/${state.settings.pushGoal} Push-ups`;el.plankGoalPill.textContent=`${fmt(plank)}/${fmt(state.settings.plankMinutes*60)} Plank`;el.progressRing.style.setProperty("--p",p);el.progressPercent.textContent=p;el.stepCounter.textContent=`${done()} / ${state.session.steps.length}`;el.completion.classList.toggle("show",state.session.completed);
if(state.session.completed){el.timerState.textContent="Abgeschlossen";el.currentTitle.textContent="Heute erledigt";el.currentSubtitle.textContent="Kalender wurde markiert.";el.timeDisplay.textContent="00:00";el.mainBtn.textContent="Fertig";el.mainBtn.disabled=true;el.skipBtn.textContent="Neuer Tag";el.skipBtn.disabled=false}
else if(rest){let r=(new Date(state.restUntil).getTime()-Date.now())/1000;el.timerState.textContent="Pause";el.currentTitle.textContent="Kurz warten";el.currentSubtitle.textContent=s?`Danach: ${label(s)}`:"Nächster Satz";el.timeDisplay.textContent=fmt(r);el.mainBtn.textContent="Pause überspringen";el.mainBtn.disabled=false;el.skipBtn.textContent="Nächster Satz";el.skipBtn.disabled=false}
else if(!state.session.started){el.timerState.textContent="Bereit";el.currentTitle.textContent="Session starten";el.currentSubtitle.textContent="Linearer Ablauf mit Countdown und Auto-Pace.";el.timeDisplay.textContent="00:00";el.mainBtn.textContent="Start";el.mainBtn.disabled=false;el.skipBtn.textContent="Überspringen";el.skipBtn.disabled=true}
else if(s){el.timerState.textContent=s.type==="push"?"Push-up Satz":"Plank Satz";el.currentTitle.textContent=label(s);el.currentSubtitle.textContent=s.type==="push"?"Countdown läuft. Danach abhaken.":"Timer läuft. Bei 00:00 automatisch erledigt.";el.timeDisplay.textContent=fmt(rem(s));el.mainBtn.textContent=s.type==="push"?"Abhaken":"Läuft";el.mainBtn.disabled=s.type==="plank";el.skipBtn.textContent="Überspringen";el.skipBtn.disabled=false}
renderSteps();renderCal();sync();save()}
function renderSteps(){let f=document.createDocumentFragment(),a=state.session.currentIndex;state.session.steps.forEach((s,i)=>{let b=document.createElement("button");b.className=`step ${s.done?"done":""} ${i===a&&!state.session.completed?"active":""}`;b.innerHTML=`<div class=node><div class=dot></div></div><div><div class=stitle>${s.title}</div><div class=ssub>${s.type==="push"?"Kraft":"Core"} · ${i+1} von ${state.session.steps.length}</div></div><div class=chip>${s.type==="push"?s.amount+"x":fmt(s.duration)}</div>`;b.onclick=()=>{if(s.done)return;state.session.started=true;state.session.currentIndex=i;state.restUntil=null;startWork();render()};f.appendChild(b)});el.steps.replaceChildren(f)}
function renderCal(){let now=new Date(),y=now.getFullYear(),m=now.getMonth(),first=new Date(y,m,1),last=new Date(y,m+1,0),off=(first.getDay()+6)%7,f=document.createDocumentFragment();["M","D","M","D","F","S","S"].forEach(w=>{let d=document.createElement("div");d.className="weekday";d.textContent=w;f.appendChild(d)});for(let i=0;i<off;i++){let d=document.createElement("div");d.className="day";d.style.opacity=0;f.appendChild(d)}for(let d=1;d<=last.getDate();d++){let dt=new Date(y,m,d),k=key(dt),x=document.createElement("div");x.className=`day ${k===key()?"today":""} ${state.history[k]?.completed?"done":""}`;x.innerHTML=`<span>${d}</span>`;f.appendChild(x)}el.calendarTitle.textContent=now.toLocaleDateString("de-DE",{month:"long",year:"numeric"});el.streakText.textContent=`${streak()} Tage Streak`;el.calendarGrid.replaceChildren(f)}
function streak(){let c=0,d=new Date();while(state.history[key(d)]?.completed){c++;d.setDate(d.getDate()-1)}return c}
function sync(){["pushGoal","pushSets","pushSeconds","plankMinutes","plankSets","sessionMinutes","splitMode"].forEach(id=>el[id].value=state.settings[id])}
function start(){state.session.started=true;startWork();render();toast("Session gestartet")}
function startWork(){if(!state.workStarted)state.workStarted=new Date().toISOString()}
function completeStep(){let s=cur();if(!s)return completeAll();s.done=true;state.workStarted=null;let next=state.session.steps.findIndex(x=>!x.done);state.session.currentIndex=next<0?state.session.steps.length:next;if(next<0)return completeAll();state.restUntil=new Date(Date.now()+restSeconds()*1000).toISOString();render()}
function completeAll(){state.session.completed=true;state.restUntil=null;state.workStarted=null;state.history[state.session.date]={completed:true,completedAt:new Date().toISOString()};save();render();toast("Training abgeschlossen");if(navigator.vibrate)navigator.vibrate([40,60,40])}
function tick(){let s=cur();if(state.restUntil&&new Date(state.restUntil).getTime()<=Date.now()){state.restUntil=null;startWork()}if(s&&state.session.started&&!isRest()&&state.workStarted&&rem(s)<=0){if(s.type==="plank")completeStep();else state.workStarted=null}render()}
function apply(){state.settings.pushGoal=clamp(el.pushGoal.value,10,500,100);state.settings.pushSets=clamp(el.pushSets.value,2,30,10);state.settings.pushSeconds=clamp(el.pushSeconds.value,10,180,45);state.settings.plankMinutes=clamp(el.plankMinutes.value,1,30,5);state.settings.plankSets=clamp(el.plankSets.value,2,30,10);state.settings.sessionMinutes=clamp(el.sessionMinutes.value,10,180,60);state.settings.splitMode=el.splitMode.value;state.session=create(state.settings);state.restUntil=null;state.workStarted=null;render();toast("Setup aktualisiert")}
function clamp(v,min,max,fb){v=Number(v);return Number.isNaN(v)?fb:Math.min(max,Math.max(min,Math.round(v)))}
function resetToday(){state.session=create(state.settings);state.restUntil=null;state.workStarted=null;delete state.history[key()];render();toast("Heute zurückgesetzt")}
function resetAll(){if(!confirm("Alles löschen?"))return;state=fresh();render();toast("Alles zurückgesetzt")}
function backup(){let blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=`daily-core-backup-${key()}.json`;a.click();URL.revokeObjectURL(url)}
function importFile(file){if(!file)return;let r=new FileReader();r.onload=()=>{try{state=norm(JSON.parse(r.result));render();toast("Backup importiert")}catch{toast("Import fehlgeschlagen")}};r.readAsText(file)}
function toast(t){el.toast.textContent=t;el.toast.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>el.toast.classList.remove("show"),1600)}
el.mainBtn.onclick=()=>{if(!state.session.started)return start();if(isRest()){state.restUntil=null;startWork();return render()}completeStep()};el.skipBtn.onclick=()=>{if(state.session.completed)return resetToday();if(isRest()){state.restUntil=null;startWork();return render()}completeStep()};el.settingsBtn.onclick=()=>el.settingsPanel.classList.toggle("open");el.themeBtn.onclick=()=>{state.settings.theme=state.settings.theme==="dark"?"light":"dark";render()};["pushGoal","pushSets","pushSeconds","plankMinutes","plankSets","sessionMinutes","splitMode"].forEach(id=>el[id].onchange=apply);el.newDayBtn.onclick=resetToday;el.resetBtn.onclick=resetAll;el.exportBtn.onclick=backup;el.importBtn.onclick=()=>el.importFile.click();el.importFile.onchange=e=>importFile(e.target.files[0]);document.addEventListener("visibilitychange",()=>{if(!document.hidden)tick()});window.addEventListener("beforeunload",save);render();timer=setInterval(tick,1000);
if("serviceWorker"in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./service-worker.js").catch(()=>{}))}
</script>
</body></html>
